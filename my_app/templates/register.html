{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ro'yxatdan o'tish</title>
    <link rel="stylesheet" href="{% static 'css/register.css' %}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <!-- Fon video yoki rasm -->
    {% if site_settings %}
        {% if site_settings.background_video %}
            <video autoplay muted loop class="bg-video">
                <source src="{{ site_settings.background_video.url }}" type="video/mp4">
            </video>
        {% elif site_settings.background_image %}
            <div class="bg-video" style="background-image: url('{{ site_settings.background_image.url }}');"></div>
        {% else %}
            <video autoplay muted loop class="bg-video">
                <source src="{% static 'video/uy.mp4' %}" type="video/mp4">
            </video>
        {% endif %}
    {% else %}
        <video autoplay muted loop class="bg-video">
            <source src="{% static 'video/uy.mp4' %}" type="video/mp4">
        </video>
    {% endif %}

    <div class="wrapper">
        <h1>Ro'yxatdan o'tish</h1>

        <form id="registerForm" action="" method="post">
            {% csrf_token %}

            <!-- Username -->
            <div class="input-box">
                <input type="text" id="username" name="username" placeholder="Username" required>
                <i class='bx bx-user-circle'></i>
                <small id="usernameError" style="color:red;"></small>
            </div>

            <!-- Password -->
            <div class="input-box">
                <input type="password" id="password" name="password" placeholder="Parol" required>
                <i class='bx bx-lock'></i>
                <i class='bx bxs-low-vision toggle-password' id="togglePassword1"></i>
            </div>

            <!-- Confirm Password -->
            <div class="input-box">
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Parolni takrorlang" required>
                <i class='bx bx-lock'></i>
                <i class='bx bxs-low-vision toggle-password' id="togglePassword2"></i>
            </div>

            <!-- Matematik amal -->
            <div class="input-box">
                <label id="mathLabel" style="color:#fff; margin-bottom:5px; display:block;"></label>
                <input type="number" id="math_answer" placeholder="Javobni kiriting" required>
                <i class='bx bx-calculator'></i>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-success">Ro'yxatdan o'tish</button>

            <!-- Login link -->
            <div class="login-link">
                <p>Allaqachon akkaunt yaratdingizmi? <a href="{% url 'login' %}">Kirish</a></p>
            </div>
        </form>
    </div>

    <!-- JS -->
    <script>
        // =========================
        // USERNAME AJAX TEKSHIRUV
        // =========================
        const usernameInput = document.getElementById("username");
        const usernameError = document.getElementById("usernameError");

        usernameInput.addEventListener("keyup", function() {
            const username = this.value;

            if(username.length > 2){
                fetch(`/check-username/?username=${username}`)
                .then(response => response.json())
                .then(data => {
                    if(data.exists){
                        usernameError.innerText = "Bu username band! Boshqa tanlang.";
                    } else {
                        usernameError.innerText = "";
                    }
                });
            } else {
                usernameError.innerText = "";
            }
        });

        // =========================
        // PASSWORD KO'RSATISH / BERKITISH
        // =========================
        const togglePassword1 = document.getElementById("togglePassword1");
        const togglePassword2 = document.getElementById("togglePassword2");
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirm_password");

        togglePassword1.addEventListener("click", function () {
            const type = password.type === "password" ? "text" : "password";
            password.type = type;
            this.classList.toggle('active');
        });

        togglePassword2.addEventListener("click", function () {
            const type = confirmPassword.type === "password" ? "text" : "password";
            confirmPassword.type = type;
            this.classList.toggle('active');
        });

        // =========================
        // MATEMATIK AMAL
        // =========================
        const mathLabel = document.getElementById('mathLabel');
        const mathAnswer = document.getElementById('math_answer');

        let num1 = Math.floor(Math.random() * 10);
        let num2 = Math.floor(Math.random() * 10 - num1 >= 0 ? 10 - num1 : 0);
        let correctAnswer = num1 + num2;

        mathLabel.innerText = `Quyidagi amalni yeching: ${num1} + ${num2} = ?`;

        // =========================
        // FORM VALIDATION
        // =========================
        const form = document.getElementById('registerForm');

        form.addEventListener('submit', function(e){
            const passwordValue = password.value;
            const confirmValue = confirmPassword.value;
            const mathValue = parseInt(mathAnswer.value);

            if(passwordValue.length < 8){
                alert("Parol kamida 8 ta belgi bo'lishi kerak!");
                e.preventDefault();
                password.value = '';
                confirmPassword.value = '';
                return;
            }

            if(passwordValue !== confirmValue){
                alert("Parollar mos emas!");
                e.preventDefault();
                password.value = '';
                confirmPassword.value = '';
                return;
            }

            if(mathValue !== correctAnswer){
                alert("Matematik amal xato! Iltimos qayta urinib ko'ring.");
                e.preventDefault();
                mathAnswer.value = '';
                return;
            }

            if(usernameError.innerText !== ""){
                alert("Iltimos boshqa username tanlang!");
                e.preventDefault();
                return;
            }
        });
    </script>

</body>
</html>
