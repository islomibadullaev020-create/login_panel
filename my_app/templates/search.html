{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search - BestMedia</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link rel="stylesheet" href="{% static 'css/search.css' %}">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h2 class="animated-logo">BestMedia</h2>
    <div class="nav-links">
        <a href="{% url 'home' %}">
            <i class='bx bx-home'></i>
        </a>
        <a href="{% url 'profile' %}">
            <i class='bx bx-user'></i> Profil
        </a>
        <a href="{% url 'home' %}" class="btn-profile">
           <i class='bx bxs-left-arrow-alt'></i> Orqaga
        </a>
    </div>
</div>

<!-- Search Section -->
<div class="search-wrapper">
    <form method="GET" action="{% url 'search' %}" onsubmit="return false;">
        <input type="text"
               id="search-input"
               placeholder="Anime nomini yozing..."
               autocomplete="off">
        <button type="submit">Qidirish</button>
    </form>
</div>

<!-- Results Container -->
<div class="container hide-cards" id="movie-container">

    {% for movie in movies %}
    <div class="card" data-title="{{ movie.title|lower }}">
        <!-- Card rasm: admin tomonidan berilgan -->
        <img src="{{ movie.image.url }}" alt="{{ movie.title }}">
        <div class="card-content">
            <h3>{{ movie.title }}</h3>
            <p>Qismlar: {{ movie.episodes.count }}</p>
            <a href="{% url 'movie_detail' movie.id %}" class="btn-watch">
                Anime ko‘rish
            </a>
        </div>
    </div>
    {% endfor %}

</div>

<!-- Footer -->
<footer>
    <div class="footer-content">
        <h3>ANI•BEST</h3>
        <p>"Hozirgilar oldinda emas, <br>
           Oldingilar orqada emas, <br>
           Biz ANI•BEST miz"</p>
        <p class="copyright">
            © 2026 ANI•BEST. Barcha huquqlar himoyalangan.
        </p>
    </div>
</footer>

<!-- Real-time search script -->
<script>
const searchInput = document.getElementById('search-input');
const cards = document.querySelectorAll('#movie-container .card');
const container = document.getElementById('movie-container');

// Boshlanganda cardlarni yashirish
cards.forEach(card => card.style.display = 'none');

searchInput.addEventListener('input', () => {
    const query = searchInput.value.toLowerCase().trim();

    // Background rasm va cardlarni toggle qilish
    if(query.length > 0){
        container.classList.add('no-bg');
        container.classList.remove('hide-cards');
    } else {
        container.classList.remove('no-bg');
        container.classList.add('hide-cards');
    }

    // Cardlarni filtrlaymiz
    let anyVisible = false;
    cards.forEach(card => {
        const title = card.getAttribute('data-title');
        if(query.length > 0 && title.includes(query)){
            card.style.display = 'flex';
            anyVisible = true;
        } else {
            card.style.display = 'none';
        }
    });

    // Agar input bo‘sh bo‘lsa, cardlarni ham yashiramiz
    if(query.length === 0){
        cards.forEach(card => card.style.display = 'none');
    }

    // Hech narsa topilmasa, xabar chiqarish
    let existingMsg = document.getElementById('no-results-msg');
    if(!anyVisible && query.length > 0){
        if(!existingMsg){
            const msg = document.createElement('p');
            msg.id = 'no-results-msg';
            msg.textContent = `"${query}" bo‘yicha hech narsa topilmadi ❌`;
            msg.style.gridColumn = '1 / -1';
            msg.style.textAlign = 'center';
            msg.style.fontSize = '18px';
            container.appendChild(msg);
        }
    } else if(existingMsg){
        existingMsg.remove();
    }
});
</script>

</body>
</html>
